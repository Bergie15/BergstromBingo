<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private Custom Bingo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Custom Bingo</h1>
        <p>Edit any square, tap/click to mark it green, and get fireworks for 5 in a row.</p>
      </header>

      <section class="controls">
        <button id="reset-board" type="button">Reset Board</button>
        <button id="clear-marks" type="button">Clear Marks</button>
      </section>

      <section class="board-wrapper">
        <div id="bingo-board" class="board" aria-label="Bingo board"></div>
      </section>

      <p id="win-message" class="win-message" aria-live="polite"></p>
    </main>

    <canvas id="fireworks" class="fireworks" aria-hidden="true"></canvas>

    <template id="cell-template">
      <button class="cell" type="button">
        <span class="cell-text" contenteditable="true"></span>
      </button>
    </template>

    <script src="script.js"></script>
  </body>
</html>
