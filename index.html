<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private Custom Bingo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Custom Bingo</h1>
        <p>Each player can have their own board progress. Use Edit Mode to change the shared square text for everyone.</p>
      </header>

      <section class="player-controls">
        <label for="player-name">Player name</label>
        <input id="player-name" type="text" maxlength="30" placeholder="Enter your name" autocomplete="name" />
        <button id="save-player" type="button">Create / Switch Board</button>
        <p id="current-player" class="current-player" aria-live="polite"></p>
      </section>

      <div class="layout">
        <section class="main-panel">
          <section class="controls">
            <button id="clear-marks" type="button">Clear My Marks</button>

            <details class="menu-wrap">
              <summary class="menu-trigger" aria-label="Open board actions">☰</summary>
              <div class="menu-items">
                <button id="toggle-edit" type="button">Enter Edit Mode</button>
                <button id="save-text" type="button" hidden>Update Wording</button>
                <button id="reset-board" type="button">Reset Shared Text</button>
              </div>
            </details>
          </section>

          <p id="sync-status" class="sync-status" aria-live="polite"></p>

          <section class="board-wrapper">
            <div id="bingo-board" class="board" aria-label="Bingo board"></div>
          </section>

          <p id="win-message" class="win-message" aria-live="polite"></p>
        </section>

        <aside class="progress-panel" aria-label="Player progress">
          <h2>Player Progress</h2>
          <ul id="progress-list" class="progress-list"></ul>
        </aside>
      </div>
    </main>

    <canvas id="fireworks" class="fireworks" aria-hidden="true"></canvas>

    <template id="cell-template">
      <button class="cell" type="button">
        <span class="cell-text"></span>
      </button>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>
</html>
